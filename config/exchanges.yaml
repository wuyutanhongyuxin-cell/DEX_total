# Exchange Configuration
# API keys are loaded from environment variables (never hardcode!)

exchanges:
  # --- Tier 1: CEX via ccxt ---
  binance:
    tier: 1
    type: ccxt
    ccxt_id: binanceusdm
    enabled: true
    api_key_env: BINANCE_API_KEY
    api_secret_env: BINANCE_API_SECRET
    options:
      defaultType: future
      sandboxMode: false

  okx:
    tier: 1
    type: ccxt
    ccxt_id: okx
    enabled: true
    api_key_env: OKX_API_KEY
    api_secret_env: OKX_API_SECRET
    passphrase_env: OKX_PASSPHRASE
    options:
      defaultType: swap

  bitget:
    tier: 1
    type: ccxt
    ccxt_id: bitget
    enabled: true
    api_key_env: BITGET_API_KEY
    api_secret_env: BITGET_API_SECRET
    passphrase_env: BITGET_PASSPHRASE
    options:
      defaultType: swap

  # --- Tier 2: DEX (public data APIs, no auth required) ---
  lighter:
    tier: 2
    type: custom
    enabled: true
    rest_url: https://mainnet.lighter.xyz
    ws_url: wss://mainnet.lighter.xyz/ws

  grvt:
    tier: 2
    type: custom
    enabled: true
    # 注意: trades.grvt.io 是公开市场数据端点 (/full/v1/*)
    # edge.grvt.io 是账户/交易端点，本项目不使用
    rest_url: https://trades.grvt.io

  hyperliquid:
    tier: 2
    type: custom
    enabled: true
    # 注意: Hyperliquid 所有 REST 调用 POST 到 /info 端点
    rest_url: https://api.hyperliquid.xyz/info
    ws_url: wss://api.hyperliquid.xyz/ws

  nado:
    tier: 2
    type: custom
    enabled: true
    rest_url: https://gateway.prod.nado.xyz
    archive_url: https://archive.prod.nado.xyz
    ws_url: wss://gateway.prod.nado.xyz/v1/subscribe

  # --- Tier 3: DEX REST only (public, no auth required) ---
  paradex:
    tier: 3
    type: rest
    enabled: true
    rest_url: https://api.paradex.trade/v1

  aster:
    tier: 3
    type: rest
    enabled: true
    rest_url: https://api.aster.finance

  edgex:
    tier: 3
    type: rest
    enabled: true
    rest_url: https://api.edgex.exchange

  variational:
    tier: 3
    type: rest
    enabled: true
    rest_url: https://omni-client-api.prod.ap-northeast-1.variational.io

  o1xyz:
    tier: 3
    type: rest
    enabled: true
    rest_url: https://zo-mainnet.n1.xyz
